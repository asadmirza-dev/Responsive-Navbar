<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Navbar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <ul class="slidebar">
                <li Onclick=hideslidebar()><a href="#">Close</a></li>
                <li><a href="#">Home</a></li>
                <li><a href="#">Blog</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">History</a></li>
            </ul>
            <ul>
                <li><a href="#">Code with Mirza</a></li>
                <li class="hideonmobile"><a href="#">Home</a></li>
                <li class="hideonmobile"><a href="#">Blog</a></li>
                <li class="hideonmobile"><a href="#">About</a></li>
                <li class="hideonmobile"><a href="#">History</a></li>
                <li Onclick=showslidebar()><a href="#"><span class="material-symbols-outlined">
Menu
</span></a></li>
            </ul>
        </nav>
    </header>
    <script>
        function showslidebar(){
            const slidebar = document.querySelector('.slidebar');
            slidebar.style.display = 'flex';
        }
        function hideslidebar(){
            const hideslidebar = document.querySelector('.slidebar');
            hideslidebar.style.display = 'none';
        }
      
    </script>
</body>
</html>
